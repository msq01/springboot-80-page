<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Spring Boot 80 Port</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Arial, "Microsoft YaHei", sans-serif;
            background: #f5f7fb;
            color: #1f2937;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
        }

        main {
            width: min(720px, calc(100% - 32px));
            padding: 40px;
            border: 1px solid #d8dee9;
            border-radius: 8px;
            background: #ffffff;
            box-shadow: 0 18px 45px rgba(31, 41, 55, 0.08);
        }

        h1 {
            margin: 0 0 16px;
            font-size: 32px;
        }

        p {
            margin: 0;
            font-size: 18px;
            line-height: 1.7;
        }

        code {
            padding: 2px 6px;
            border-radius: 4px;
            background: #eef2f7;
        }
    </style>
</head>
<body>
<main>
    <h1>Spring Boot 页面已启动</h1>
    <p>当前项目监听 <code>80</code> 端口。访问 <code>http://localhost/</code> 就能看到这个页面。</p>
</main>
</body>
</html>
